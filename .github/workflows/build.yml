name: Cloud Build (Android APK)

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Initialize Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Initialize Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Yarn Engine & System Dependencies
        run: |
          npm install -g yarn
          yarn install

      - name: Generate Native Android Code
        run: npx expo prebuild --platform android --clean

      - name: Compile APK via Gradle
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Extract APK Payload
        uses: actions/upload-artifact@v4
        with:
          name: studyOptimum-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
