name: Cloud Build (Android APK)

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Initialize Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Initialize Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Environment Sanitation & Dependency Alignment
        run: |
          rm -f package-lock.json
          npm install -g yarn
          yarn add expo-linking
          yarn install
          npx expo install --fix

      - name: Generate Native Android Code
        run: npx expo prebuild --platform android --clean

      - name: Compile APK via Gradle (Release Mode)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Extract APK Payload
        uses: actions/upload-artifact@v4
        with:
          name: studyOptimum-Android-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
